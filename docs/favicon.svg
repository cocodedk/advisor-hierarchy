<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="4" fill="#09090f"/>
  <!-- Hierarchy triangle: three nodes connected top-down -->
  <!-- Top node (Master) -->
  <circle cx="16" cy="5" r="3.5" fill="#00ff88"/>
  <!-- Middle-left node (Executor) -->
  <circle cx="8" cy="18" r="2.8" fill="#00ff88" opacity="0.75"/>
  <!-- Middle-right node (Executor) -->
  <circle cx="24" cy="18" r="2.8" fill="#00ff88" opacity="0.75"/>
  <!-- Bottom node (Advisor) -->
  <circle cx="16" cy="29" r="2.2" fill="#ffb800" opacity="0.85"/>
  <!-- Edges: top to mid-left -->
  <line x1="16" y1="8.5" x2="8" y2="15.2" stroke="#00ff88" stroke-width="1.2" opacity="0.5"/>
  <!-- Edges: top to mid-right -->
  <line x1="16" y1="8.5" x2="24" y2="15.2" stroke="#00ff88" stroke-width="1.2" opacity="0.5"/>
  <!-- Edges: mid-left to bottom -->
  <line x1="8" y1="20.8" x2="16" y2="26.8" stroke="#00ff88" stroke-width="1" opacity="0.35"/>
  <!-- Edges: mid-right to bottom -->
  <line x1="24" y1="20.8" x2="16" y2="26.8" stroke="#00ff88" stroke-width="1" opacity="0.35"/>
</svg>
