<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Invaders</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-height: 100vh;
      margin: 0;
      font-family: 'Orbitron', monospace;
      overflow: auto;
    }
    .game-info {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 800px;
    }
    .build-tag {
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.15em;
      padding: 3px 10px;
      background: #00ff88;
      color: #000;
    }
    .score-line {
      font-size: 10px;
      color: #8888aa;
      letter-spacing: 0.1em;
    }
    .score-line strong {
      color: #00ff88;
    }
    #root {
      position: relative;
      width: 800px;
      height: 600px;
      background: #000;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      display: block;
    }
    .hud {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      color: #00ff88;
      font-size: 11px;
      letter-spacing: 0.12em;
      pointer-events: none;
      user-select: none;
      z-index: 10;
    }
    .hud-lives {
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: rgba(0, 0, 8, 0.85);
      backdrop-filter: blur(6px);
      z-index: 20;
    }
    .overlay h1 {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 3rem;
      color: #00ff88;
      margin: 0;
      text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff44;
      letter-spacing: 0.05em;
    }
    .overlay h2 {
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 2rem;
      color: #00ff88;
      margin: 0;
      letter-spacing: 0.08em;
    }
    .overlay p {
      font-size: 0.78rem;
      color: #88aaaa;
      letter-spacing: 0.1em;
      margin: 0;
    }
    .si-btn {
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      font-weight: 700;
      background: transparent;
      color: #00ff88;
      border: 2px solid #00ff88;
      padding: 10px 24px;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: all 200ms;
    }
    .si-btn:hover {
      background: #00ff88;
      color: #000;
      box-shadow: 0 0 16px #00ff88;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <div class="game-info">
    <span class="build-tag">AH BUILD</span>
    <span class="score-line"><strong>22 / 23</strong> &nbsp;·&nbsp; Visual 5/5 &nbsp;·&nbsp; Code 4/5 &nbsp;·&nbsp; Features 13/13</span>
  </div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/htm@3/dist/htm.umd.js"></script>

  <script src="si-config.js"></script>
  <script src="si-engine.js"></script>
  <script src="si-render.js"></script>
  <script src="si-app.js"></script>
</body>
</html>
