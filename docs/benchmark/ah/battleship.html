<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BATTLESHIP — AH Build</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#09090f;--panel:#13131f;--green:#00ff88;--amber:#ffb800;--red:#ff4466;--blue:#4da6ff;--dim:#3a3a52;--mid:#8888aa;--white:#e8e8ff;--cell:34px;--gap:2px; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--white);font-family:'JetBrains Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px 8px 40px;overflow-x:hidden}
    h1{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(1.4rem,4vw,2.2rem);letter-spacing:.18em;color:var(--green);text-shadow:0 0 20px rgba(0,255,136,.45);margin-bottom:4px}
    .subtitle{font-size:.7rem;color:var(--mid);letter-spacing:.15em;margin-bottom:20px}
    .game-wrapper{display:flex;flex-direction:column;align-items:center;gap:16px;width:100%;max-width:900px}
    .boards-row{display:flex;flex-wrap:wrap;gap:24px;justify-content:center;width:100%}
    #status-bar{background:var(--panel);border:1px solid var(--dim);border-radius:6px;padding:10px 18px;font-size:.78rem;color:var(--white);text-align:center;width:100%;max-width:760px;min-height:40px;display:flex;align-items:center;justify-content:center;letter-spacing:.04em;transition:border-color .3s}
    #status-bar.turn-player{border-color:var(--green)}
    #status-bar.turn-computer{border-color:var(--blue)}
    #status-bar.game-over{border-color:var(--amber)}
    .board-section{display:flex;flex-direction:column;align-items:center;gap:10px}
    .board-title{font-family:'Orbitron',sans-serif;font-size:.75rem;letter-spacing:.15em;color:var(--mid);text-transform:uppercase}
    .board-title span{color:var(--green)}
    .grid-wrap{display:grid;grid-template-columns:22px repeat(10,var(--cell));grid-template-rows:22px repeat(10,var(--cell));gap:var(--gap)}
    .coord-label{display:flex;align-items:center;justify-content:center;font-size:.62rem;color:var(--mid);user-select:none}
    .cell{width:var(--cell);height:var(--cell);background:var(--panel);border:1px solid var(--dim);border-radius:3px;cursor:default;position:relative;transition:background .15s,border-color .15s,box-shadow .15s;display:flex;align-items:center;justify-content:center}
    .cell.preview-valid{background:rgba(0,255,136,.18);border-color:var(--green)}
    .cell.preview-invalid{background:rgba(255,68,102,.18);border-color:var(--red)}
    .cell.ship{background:rgba(77,166,255,.4);border-color:var(--blue)}
    .cell.ship-0{background:rgba(77,166,255,.45);border-color:var(--blue)}
    .cell.ship-1{background:rgba(0,255,136,.35);border-color:var(--green)}
    .cell.ship-2{background:rgba(255,184,0,.35);border-color:var(--amber)}
    .cell.ship-3{background:rgba(180,90,255,.35);border-color:#b45aff}
    .cell.ship-4{background:rgba(255,100,50,.35);border-color:#ff6432}
    .cell.miss::after,.cell.miss-player::after{content:'';width:8px;height:8px;border-radius:50%;opacity:.7}
    .cell.miss::after{background:var(--white)}
    .cell.miss-player::after{background:var(--mid);opacity:.8}
    .cell.hit{background:rgba(255,68,102,.35);border-color:var(--red);box-shadow:0 0 8px rgba(255,68,102,.6),inset 0 0 6px rgba(255,68,102,.3)}
    .cell.hit::after,.cell.enemy-hit::after{content:'✕';font-size:1rem;color:var(--red);text-shadow:0 0 6px var(--red)}
    .cell.sunk{background:rgba(255,68,102,.55);border-color:var(--red);box-shadow:0 0 12px rgba(255,68,102,.8)}
    .cell.sunk::after{content:'✕';font-size:1rem;color:#fff;text-shadow:0 0 8px var(--red)}
    .cell.enemy-hit{background:rgba(255,68,102,.35);border-color:var(--red);box-shadow:0 0 8px rgba(255,68,102,.5)}
    .cell.enemy-sunk{background:rgba(255,68,102,.55);border-color:var(--red);box-shadow:0 0 12px rgba(255,68,102,.8)}
    .cell.enemy-sunk::after{content:'✕';font-size:1rem;color:#fff}
    .cell.targetable{cursor:crosshair}
    .cell.targetable:hover{background:rgba(0,255,136,.12);border-color:var(--green)}
    .cell.placement-clickable{cursor:pointer}
    .cell.placement-clickable:hover{background:rgba(0,255,136,.08);border-color:var(--mid)}
    .hud-row{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;width:100%;max-width:760px}
    .ship-list{background:var(--panel);border:1px solid var(--dim);border-radius:8px;padding:12px 16px;flex:1;min-width:180px}
    .ship-list h3{font-family:'Orbitron',sans-serif;font-size:.68rem;letter-spacing:.12em;color:var(--mid);margin-bottom:8px;text-transform:uppercase}
    .ship-entry{display:flex;align-items:center;justify-content:space-between;padding:4px 0;font-size:.72rem;color:var(--white);border-bottom:1px solid rgba(58,58,82,.5);transition:color .3s}
    .ship-entry:last-child{border-bottom:none}
    .ship-entry.sunk-entry{color:var(--mid);text-decoration:line-through}
    .ship-dots{display:flex;gap:3px}
    .ship-dot{width:10px;height:10px;border-radius:2px;background:var(--dim);transition:background .3s,box-shadow .3s}
    .ship-dot.alive{background:var(--green);box-shadow:0 0 4px rgba(0,255,136,.5)}
    .ship-dot.hit-dot{background:var(--red);box-shadow:0 0 4px rgba(255,68,102,.5)}
    .controls{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
    button{font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:600;letter-spacing:.08em;padding:8px 18px;border-radius:5px;cursor:pointer;transition:all .2s;text-transform:uppercase;border:1px solid}
    button:disabled{opacity:.35;cursor:default}
    .btn-primary{background:var(--green);color:var(--bg);border-color:var(--green)}
    .btn-primary:hover:not(:disabled){background:transparent;color:var(--green);box-shadow:0 0 10px rgba(0,255,136,.35)}
    .btn-ghost{background:transparent;color:var(--mid);border-color:var(--dim)}
    .btn-ghost:hover:not(:disabled){color:var(--green);border-color:var(--green);box-shadow:0 0 8px rgba(0,255,136,.2)}
    .btn-danger{background:transparent;color:var(--red);border-color:var(--red)}
    .btn-danger:hover:not(:disabled){background:rgba(255,68,102,.1);box-shadow:0 0 8px rgba(255,68,102,.3)}
    .placement-queue{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;align-items:center}
    .queue-ship{font-size:.68rem;padding:5px 10px;border-radius:4px;border:1px solid var(--dim);color:var(--mid);background:var(--panel);white-space:nowrap}
    .queue-ship.active{border-color:var(--green);color:var(--green);box-shadow:0 0 8px rgba(0,255,136,.25)}
    .queue-ship.placed{border-color:var(--dim);color:var(--dim);text-decoration:line-through}
    .overlay-box{background:var(--panel);border:2px solid var(--dim);border-radius:12px;padding:40px 56px;text-align:center;max-width:380px;width:90%}
    .overlay-box h2{font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:900;letter-spacing:.12em;margin-bottom:8px}
    .overlay-box h2.win{color:var(--green);text-shadow:0 0 24px rgba(0,255,136,.6)}
    .overlay-box h2.lose{color:var(--red);text-shadow:0 0 24px rgba(255,68,102,.6)}
    .overlay-box p{color:var(--mid);font-size:.8rem;margin-bottom:24px}
    @media(max-width:520px){:root{--cell:28px}.coord-label{font-size:.55rem}}
    @media(max-width:400px){:root{--cell:24px}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/htm@3/dist/htm.umd.js"></script>
  <script src="constants.js"></script>
  <script src="gameLogic.js"></script>
  <script src="Grid.js"></script>
  <script src="ShipList.js"></script>
  <script src="App.js"></script>
</body>
</html>
